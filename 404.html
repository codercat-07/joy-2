<!doctype html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>৪০৪ - পাতাটি খুঁজে পাওয়া যায়নি</title>
</head>
<body style="min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--cream); font-family: 'Hind Siliguri', sans-serif;">
  <div style="text-align: center; max-width: 480px; padding: 40px 20px;">
    
    <div style="width: 80px; height: 80px; border-radius: 24px; background: var(--white); display: flex; align-items: center; justify-content: center; margin: 0 auto 32px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); animation: float 6s ease-in-out infinite;">
      <i data-lucide="frown" style="width: 32px; height: 32px; color: var(--forest);"></i>
    </div>
    
    <h1 style="font-family: 'Tiro Bangla', serif; font-size: clamp(64px, 12vw, 96px); font-weight: 400; line-height: 1; color: var(--ink); margin-bottom: 16px;">৪০৪</h1>
    
    <h2 style="font-size: 24px; font-weight: 700; color: var(--ink); margin-bottom: 24px;">দুঃখিত! পাতাটি খুঁজে পাওয়া যায়নি</h2>
    
    <p style="font-size: 16px; color: var(--muted); line-height: 1.6; margin-bottom: 40px;">
      আপনি যে পেজটি খুঁজছেন তা মুছে ফেলা হয়েছে অথবা নাম পরিবর্তন করা হয়েছে বা আপাতত অনুপলব্ধ।
    </p>
    
    <a href="/" style="display: inline-flex; align-items: center; gap: 8px; background: var(--forest); color: #fff; padding: 14px 28px; border-radius: 14px; font-size: 16px; font-weight: 700; text-decoration: none; box-shadow: 0 8px 24px rgba(26,92,54,0.25); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
      <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
      মূল পাতায় ফিরে যান
    </a>

  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
    });
  </script>
</body>
</html>
